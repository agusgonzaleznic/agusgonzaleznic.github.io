name: Deploy to GitHub Pages

on:
  # Trigger on push to main branch
  push:
    branches:
      - main

  # Allow manual workflow dispatch
  workflow_dispatch:

# Set permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    # Pinned to a commit SHA (not @main) so a mutable branch ref can't be used to
    # inject malicious steps into a deploy that holds secrets + Pages write access.
    # Update the SHA deliberately on upgrade.
    uses: agusgonzaleznic/github-reusable-workflows/.github/workflows/vite-build-deploy.yml@0dcde1cbb882b676efe6b1ab98194213912e53d6 # v1.0.0
    permissions:
      contents: read
      pages: write
      id-token: write
    with:
      node-version: '22'
      install-command: 'npm ci'
      lint-command: 'npm run lint'
      build-command: 'npm run build'
      artifact-path: 'dist'
      run-lint: true
    secrets:
      build-env-vars: |
        VITE_GOOGLE_APPS_SCRIPT_URL=${{ secrets.VITE_GOOGLE_APPS_SCRIPT_URL }}
