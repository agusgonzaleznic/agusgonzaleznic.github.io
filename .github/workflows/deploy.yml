name: Deploy to GitHub Pages

on:
  # Trigger on push to main — but only when files that affect the built site
  # change. paths-ignore is a denylist (fail-safe: anything not listed still
  # deploys, so a real content change is never silently skipped) covering the
  # changes that produce identical dist output: infra, CI-only workflow, and
  # docs. NOTE: paths filters apply ONLY to push/pull_request — the Storyblok
  # webhook rebuild uses workflow_dispatch below and is unaffected.
  push:
    branches:
      - main
    paths-ignore:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
      - ".github/workflows/ci.yml"
      - "**.md"
      - ".env.example"
      - ".gitignore"
      - "LICENSE"

  # Allow manual workflow dispatch (also the Storyblok publish webhook target).
  # Not subject to the paths-ignore filter above.
  workflow_dispatch:

# Set permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    # Pinned to a commit SHA (not @main) so a mutable branch ref can't be used to
    # inject malicious steps into a deploy that holds secrets + Pages write access.
    # Update the SHA deliberately on upgrade.
    uses: agusgonzaleznic/github-reusable-workflows/.github/workflows/vite-build-deploy.yml@ee1cc3d04e2a1cf7998da955c0093c43c20fa199 # v1.1.0
    permissions:
      contents: read
      pages: write
      id-token: write
    with:
      node-version: '22'
      install-command: 'npm ci'
      lint-command: 'npm run lint'
      build-command: 'npm run build'
      artifact-path: 'dist'
      run-lint: true
    secrets:
      # VITE_GA_MEASUREMENT_ID is a repo VARIABLE (not a secret — a GA4
      # measurement ID is public by nature, visible in every tag request).
      # Unset variable → empty value → analytics feature stays off.
      #
      # Activation checklist — the privacy policy (src/pages/Legal.tsx §6)
      # states retention and no-advertising as facts, so configure the GA4
      # property FIRST; the code's Consent Mode denials cover the tag side
      # only, not property settings:
      #   1. GA4 Admin → Data settings → Data retention: event data 14 months.
      #   2. GA4 Admin → Data collection: Google Signals OFF, ads
      #      personalization OFF, advertising features data collection OFF.
      #   3. Then: gh variable set GA_MEASUREMENT_ID --body "G-XXXXXXXXXX"
      # VITE_TURNSTILE_SITE_KEY is a repo VARIABLE (the sitekey is public — it
      # ships in the bundle). Set it from the `turnstile_sitekey` Terraform
      # output after the first apply: gh variable set TURNSTILE_SITE_KEY --body "0x...".
      # Unset variable → empty value → the widget is absent and the contact
      # form renders a graceful "temporarily unavailable" state.
      #
      # NOTE: VITE_GOOGLE_APPS_SCRIPT_URL has been removed. The client rework
      # (same-origin POST to /api/contact) has landed, so the Apps Script URL
      # now lives only server-side (SSM param, read by the contact Lambda) and
      # must never ship in the public bundle.
      # DEEPL_API_KEY is a SECRET (a DeepL API Free auth key), build-time only and
      # deliberately NON-VITE so it can never be inlined into the public client
      # bundle. It drives the i18n machine-translation pipeline (scripts/translate.mjs
      # and the blog localization in scripts/fetch-blog.mjs). Unset/empty secret →
      # keyless no-op: catalogs stay untranslated, only English blog-data.json is
      # written, and the site ships English-only — safe and behavior-identical to now.
      # A locale is published only after native review and being added to
      # PUBLISHED_LOCALES in src/i18n/locales.ts; the keys alone change nothing.
      #
      # ANTHROPIC_API_KEY is a SECRET, build-time only and NON-VITE. It enables the
      # LLM post-edit pass (scripts/lib/llm-postedit.mjs) that refines raw DeepL into
      # native-quality copy during the blog localization in scripts/fetch-blog.mjs.
      # Unset/empty → the pass is skipped and the build ships raw DeepL; a Claude
      # outage/refusal degrades to raw DeepL per-string and never fails the build.
      # (The Lingui catalog post-edit runs offline via `node scripts/translate.mjs`,
      # not in this workflow — the committed .po files are the source of truth.)
      build-env-vars: |
        STORYBLOK_PUBLIC_TOKEN=${{ secrets.STORYBLOK_PUBLIC_TOKEN }}
        STORYBLOK_REQUIRE_TOKEN=1
        DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY }}
        ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
        VITE_GA_MEASUREMENT_ID=${{ vars.GA_MEASUREMENT_ID }}
        VITE_TURNSTILE_SITE_KEY=${{ vars.TURNSTILE_SITE_KEY }}

  # GitHub Pages sends Cache-Control max-age=600, so CloudFront serves stale
  # pages for up to 10 minutes after a deploy. Invalidate so new posts/pages
  # are visible immediately. Uses a dedicated OIDC role that can ONLY create
  # invalidations on the site distribution (NOT the terraform deploy role —
  # its trust policy deliberately excludes the main-ref subject).
  invalidate-cdn:
    name: Invalidate CloudFront cache
    needs: build-and-deploy
    runs-on: ubuntu-latest

    permissions:
      id-token: write # OIDC token for configure-aws-credentials

    steps:
      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_CDN_ROLE_ARN }}
          aws-region: us-east-1

      - name: Create invalidation
        env:
          DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          id=$(aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          echo "Invalidation $id created"
          aws cloudfront wait invalidation-completed \
            --distribution-id "$DISTRIBUTION_ID" --id "$id"
          echo "Invalidation $id completed"
