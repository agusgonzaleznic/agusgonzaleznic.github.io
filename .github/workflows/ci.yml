name: CI

on:
  # Trigger on pull requests to main
  pull_request:
    branches:
      - main

  # Allow manual workflow dispatchs
  workflow_dispatch:

jobs:
  ci:
    # Pinned to a commit SHA (not @main) so a mutable branch ref can't be used to
    # inject malicious workflow steps. Update the SHA deliberately on upgrade.
    uses: agusgonzaleznic/github-reusable-workflows/.github/workflows/vite-ci.yml@0dcde1cbb882b676efe6b1ab98194213912e53d6 # v1.0.0
    with:
      node-version: '22'
      install-command: 'npm ci'
      lint-command: 'npm run lint'
      build-command: 'npm run build'
      artifact-path: 'dist'
      verify-build-output: true
