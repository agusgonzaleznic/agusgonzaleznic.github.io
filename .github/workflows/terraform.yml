name: Terraform

on:
  # Plan on PRs that touch the site module (or this workflow itself)
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

  # Apply (gated) on merges to main that touch the site module
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

  # Manual re-run of the gated apply (e.g. after a failed apply)
  workflow_dispatch:

# Default-deny; each job grants only what it needs.
permissions:
  contents: read

# Single state file — serialize all runs and never cancel an in-flight
# apply mid-mutation.
concurrency:
  group: terraform-state
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  # Storyblok Management API token (sensitive)
  TF_VAR_token: ${{ secrets.STORYBLOK_MANAGEMENT_TOKEN }}
  # Shared-secret token embedded in the webhook URL (sensitive)
  TF_VAR_storyblok_webhook_url_token: ${{ secrets.STORYBLOK_WEBHOOK_URL_TOKEN }}
  # Numeric Storyblok space id (non-secret)
  TF_VAR_space_id: ${{ vars.STORYBLOK_SPACE_ID }}

defaults:
  run:
    # Site module ONLY. terraform/bootstrap/ (state bucket + OIDC role) is
    # human-applied with the root-admin profile and must never run in CI.
    working-directory: terraform

jobs:
  plan:
    name: Plan (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for configure-aws-credentials
      contents: read
      pull-requests: write # sticky plan comment
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Guard — refuse to target bootstrap/
        run: |
          wd="$(pwd)"
          if [ "$(basename "$wd")" != "terraform" ] || printf '%s' "$wd" | grep -q 'bootstrap'; then
            echo "::error::This job must run in the site module (terraform/), got: $wd. bootstrap/ is human-applied only."
            exit 1
          fi
          if [ -n "${TF_CLI_ARGS:-}${TF_CLI_ARGS_init:-}${TF_CLI_ARGS_plan:-}${TF_CLI_ARGS_apply:-}" ]; then
            echo "::error::TF_CLI_ARGS overrides are not allowed in CI."
            exit 1
          fi

      # Role trust must allow subject repo:agusgonzaleznic/agusgonzaleznic.github.io:pull_request
      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_TF_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.14.*"
          # No wrapper: plan output is captured to a file for the PR comment.
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive -diff

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        id: plan
        # Keep going so the plan (or its error) still lands in the PR comment.
        continue-on-error: true
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -lock-timeout=60s 2>&1 | tee plan.txt

      - name: Post sticky plan comment
        if: always() && (steps.plan.outcome == 'success' || steps.plan.outcome == 'failure')
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        run: |
          MARKER='<!-- terraform-plan-sticky -->'
          {
            echo "$MARKER"
            echo "## Terraform plan — ${PLAN_OUTCOME}"
            echo ""
            echo "Commit: \`${HEAD_SHA}\` | Run: [${{ github.run_id }}](${{ github.server_url }}/${REPO}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "<details><summary>Show plan output</summary>"
            echo ""
            echo '```'
            # Issue comments cap at 65536 chars; leave headroom.
            head -c 60000 plan.txt
            echo ""
            echo '```'
            echo ""
            echo "</details>"
          } > comment.md
          # Emit matching ids only (never "null") — --paginate runs the jq
          # program once per page, so an array-index form would yield one
          # value per page and break on multi-page PRs.
          cid="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" | head -n1)"
          if [ -n "$cid" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${cid}" -F body=@comment.md > /dev/null
          else
            gh api -X POST "repos/${REPO}/issues/${PR_NUMBER}/comments" -F body=@comment.md > /dev/null
          fi

      - name: Fail job if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Apply (main)
    # main only — including manual dispatch, so the gated apply can never run
    # a non-main branch's version of the Terraform code.
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    # Add a required reviewer on this environment to gate applies.
    # NOTE: with an environment, the OIDC subject becomes
    # repo:agusgonzaleznic/agusgonzaleznic.github.io:environment:terraform-production
    # — the CI role trust policy must allow it.
    environment: terraform-production
    permissions:
      id-token: write # OIDC token for configure-aws-credentials
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Guard — refuse to target bootstrap/
        run: |
          wd="$(pwd)"
          if [ "$(basename "$wd")" != "terraform" ] || printf '%s' "$wd" | grep -q 'bootstrap'; then
            echo "::error::This job must run in the site module (terraform/), got: $wd. bootstrap/ is human-applied only."
            exit 1
          fi
          if [ -n "${TF_CLI_ARGS:-}${TF_CLI_ARGS_init:-}${TF_CLI_ARGS_plan:-}${TF_CLI_ARGS_apply:-}" ]; then
            echo "::error::TF_CLI_ARGS overrides are not allowed in CI."
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_TF_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.14.*"
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      # Plan and apply the SAME saved plan in one job — a PR-time plan file
      # cannot safely carry across to a different ref/run.
      - name: Terraform plan
        run: terraform plan -no-color -input=false -lock-timeout=60s -out=tfplan

      - name: Publish plan to job summary
        run: |
          {
            echo "## Terraform plan (about to apply)"
            echo ""
            echo '```'
            terraform show -no-color tfplan | head -c 60000
            echo ""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false -lock-timeout=60s tfplan
